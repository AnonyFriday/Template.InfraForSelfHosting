services:
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    restart: unless-stopped

    ports:
      - "${FILEBROWSER_PORT:-8080}:80" # close host port due to using psdproxy

    volumes:
      - ${FILE_ROOT:-/srv}:/srv # Directory to browse/manage
      - filebrowser-data:/data

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    env_file:
      - .env

    networks:
      - global-network

    labels:
      tsdproxy.enable: "true"
      tsdproxy.port.1: "443/https:80/http"
      tsdproxy.name: "filebrowser"

volumes:
  filebrowser-data:
